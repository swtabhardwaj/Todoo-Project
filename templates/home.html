<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django ToDo App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body{
            background: linear-gradient(135deg,#7276f1,#a4c9ed);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height:100vh;
        }

        .main-card{
            border:none;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(198, 173, 220, 0.1);
            background:rgb(148, 225, 241);
        }

        .task-card{
            border:none;
            border-radius:15px;
            transition:.3s;
            box-shadow:0 5px 15px rgba(185, 155, 214, 0.08);
        }

        .task-card:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(156, 148, 225, 0.15);
        }

        .btn{
            border-radius:10px;
        }

        .form-control{
            border-radius:12px;
            padding:14px;
        }

        .badge{
            font-size:15px;
        }

        .completed-card{
            min-height:350px;
            border-radius:15px;
            border:none;
            box-shadow:0 5px 15px rgba(166, 148, 225, 0.08);
        }

        .footer-form{
            margin-top:30px;
        }

        .title-icon{
            font-size:40px;
        }

        .section-title{
            font-weight:700;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">
            📝 Django ToDo
        </h1>

        <p class="text-secondary">
            Stay organized. Stay productive.
        </p>
    </div>

    <div class="card main-card p-4">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <h2 class="fw-bold">
                    My Day
                </h2>

                <p class="text-muted">
                    {% now "jS F Y" %}
                </p>

            </div>

            <span class="badge bg-primary p-3">
                {{ tasks|length }} Tasks
            </span>

        </div>

        <hr>

        <div class="row">

            <!-- Active Tasks -->

            <div class="col-lg-7">

                <h4 class="section-title mb-3">
                    📋 Active Tasks
                </h4>

                {% for task in tasks %}

                <div class="card task-card mb-3">

                    <div class="card-body d-flex justify-content-between align-items-center">

                        <div>

                            <h5 class="mb-1">
                                {{ task.task }}
                            </h5>

                        </div>

                        <div>

                            <a href="#" class="btn btn-success btn-sm">
                                <i class="fa fa-check"></i>
                            </a>

                            <a href="#" class="btn btn-primary btn-sm">
                                <i class="fa fa-pencil"></i>
                            </a>

                            <a href="#" class="btn btn-danger btn-sm">
                                <i class="fa fa-trash"></i>
                            </a>

                        </div>

                    </div>

                </div>

                {% empty %}

                <div class="alert alert-info">
                    No active tasks.
                </div>

                {% endfor %}

            </div>

            <!-- Completed -->

            <div class="col-lg-5">

                <h4 class="section-title mb-3">
                    ✅ Completed Tasks
                </h4>

                <div class="card completed-card">

                    <div class="card-body d-flex justify-content-center align-items-center">

                        <p class="text-muted m-0">
                            No completed tasks yet.
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Add Task -->

    <div class="card main-card footer-form p-3">

        <form action="" method="POST">

            {% csrf_token %}

            <div class="input-group">

                <input
                    type="text"
                    name="task"
                    class="form-control"
                    placeholder="✍️ Add a new task...">

                <button class="btn btn-primary px-4">

                    <i class="fa fa-plus"></i>

                    Add Task

                </button>

            </div>

        </form>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
